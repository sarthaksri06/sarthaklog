<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background-color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main Container */
.container {
    width: 100%;
    max-width: 360px;
    text-align: center;
}

/* Logo */
.logo {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 25px;
}

/* Card */
.card {
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    padding: 30px;
    text-align: left;
}

/* Title */
h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 500;
}

/* Inputs */
.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border: 1px solid #d9d9d9;
    border-radius: 6px;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: black;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #222;
}

/* Links */
.switch {
    margin-top: 15px;
    text-align: center;
    font-size: 14px;
}

.switch a {
    color: black;
    font-weight: 500;
    cursor: pointer;
}

/* Hidden Name */
#nameGroup {
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo">Create An Account</div>

    <div class="card">
        <h2 id="title">Log in</h2>

        <form id="authForm">

            <div id="nameGroup" class="input-group">
                <input type="text" id="fullname" placeholder="Full name">
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" id="submitBtn">Continue</button>

            <div class="switch">
                <span id="switchText">Don't have an account?</span>
                <a id="toggleMode">Sign up</a>
            </div>

        </form>
    </div>
</div>

<script>
const form = document.getElementById('authForm');
const toggleMode = document.getElementById('toggleMode');
const title = document.getElementById('title');
const nameGroup = document.getElementById('nameGroup');
const switchText = document.getElementById('switchText');
const submitBtn = document.getElementById('submitBtn');

let isLogin = true;

// Toggle Login / Signup
toggleMode.addEventListener('click', () => {
    isLogin = !isLogin;

    if (isLogin) {
        title.textContent = "Log in";
        nameGroup.style.display = "none";
        switchText.textContent = "Don't have an account?";
        toggleMode.textContent = "Sign up";
    } else {
        title.textContent = "Sign up";
        nameGroup.style.display = "block";
        switchText.textContent = "Already have an account?";
        toggleMode.textContent = "Log in";
    }
});

// API Call (Same Backend)
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const endpoint = isLogin 
        ? 'http://127.0.0.1:5000/login'
        : 'http://127.0.0.1:5000/signup';

    const payload = isLogin
        ? {
            email: email.value,
            password: password.value
        }
        : {
            fullname: fullname.value,
            email: email.value,
            password: password.value
        };

    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok) {
            alert("✅ " + data.message);
        } else {
            alert("❌ " + data.message);
        }

    } catch (err) {
        alert("Server not running");
    }
});
</script>

</body>
</html>
